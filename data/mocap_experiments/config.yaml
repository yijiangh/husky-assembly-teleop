experiment:
  name: "mocap_cover_study"
  session_name: "20260317_cover_study_marker_adding"
  operator: "Bob"
  duration_sec: 35.0
  notes: "cover passes over robot in 35 seconds, reduce recording cameras and take 4 sets data"

take:
  take_id: "ws_back_markers10_allcam_cover_take4"
  workspace_position: "back"
  marker_configuration: "markers_10"
  camera_configuration: "Cam_21"
  #"close cameras number:3, closed camera ID: 1, 3, 7"
  cover_configuration: "cover"
  trial_index: 1
  notes: "10 markers, all cameras"  
  reference_images:
    overview: ""
    workspace: ""
    markers: ""
    camera: ""
    cover: ""
    extra: []

tags:
  marker_count: 8
  added_marker_count: 0
  disabled_camera_count: 0
  deck_motion: "none"
  robot_stationary: true

capture:
  workspace_webcam:
    enabled: true
    device_index: 0
    warmup_frames: 8
    role: "workspace"
    timelapse_enabled: true
    timelapse_interval_sec: 0.5
    timelapse_video_fps: 2.0

report:
  group_by:
    - "take.workspace_position"
    - "take.marker_configuration"
    - "take.camera_configuration"
    - "take.cover_configuration"
